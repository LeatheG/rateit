{% load static %}
<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Video Game Ratings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lacquer&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'polls/style.css' %}">
  </head>
  
  <body>
    <h1>☆★☆★→Rate it or Hate it←☆★☆★</h1>
    {% if latest_game_list %}
    <ul style="list-style: none; padding: 0; max-width: 900px; margin: 0 auto;">
    {% for game in latest_game_list %}
        <li class="game-card">
            {% if game.game_image %}
        <img src="{{ game.game_image }}" alt="{{ game.game_name }}" onerror="this.onerror=null;this.src='https://placehold.co/640x360/111111/f5f5f5?text=Image+Unavailable';">
            {% endif %}
            <div>
                <a href="{% url 'polls:detail' game.id %}">{{ game.game_name }}</a> 
                <span class="genre">({{ game.genre }})</span>
            </div>
        </li>
    {% endfor %}
    </ul>
{% else %}
    <p>No games are available to rate.</p>
{% endif %}
  </body>
</html>
