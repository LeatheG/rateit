<!DOCTYPE html>
<html>
<head>
    <title>{{ game.game_name }} - Ratings</title>
    <style>
        .rating-item {
            margin-bottom: 20px;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }
        .like-dislike-buttons {
            margin-top: 10px;
        }
        .like-btn, .dislike-btn {
            padding: 8px 15px;
            margin-right: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            text-decoration: none;
            display: inline-block;
        }
        .like-btn {
            background-color: #00ff88;
            color: #1e3c72;
        }
        .like-btn:hover {
            background-color: #00cc6a;
        }
        .dislike-btn {
            background-color: #ff4444;
            color: white;
        }
        .dislike-btn:hover {
            background-color: #cc0000;
        }
    </style>
</head>

<body>
<h1>{{ game.game_name }} - Rating Results</h1>

<ul style="list-style: none; padding: 0;">
{% for rating in game.rating_set.all %}
    <li class="rating-item">
        <p>{{ rating.rating_text }}</p>
        <div class="like-dislike-buttons">
            <a href="{% url 'polls:like_rating' rating.id %}" class="like-btn">
                👍 Like ({{ rating.likes }})
            </a>
            <a href="{% url 'polls:dislike_rating' rating.id %}" class="dislike-btn">
                👎 Dislike ({{ rating.dislikes }})
            </a>
        </div>
    </li>
{% endfor %}
</ul>

<br>
<a href="{% url 'polls:detail' game.id %}">Rate this game again?</a><br>
<a href="{% url 'polls:index' %}">← Back to all games</a>
</body>

</html>
