<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rate It or Hate It</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lacquer&family=Arial:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-one"></div>
    <div class="bg-glow bg-glow-two"></div>

    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">SWDV 290 Final Project</p>
        <h1>Rate It or Hate It</h1>
        <p class="hero-copy">
          Static GitHub Pages edition of your game ratings app.
          Like/dislike votes are stored in your browser for this static version.
        </p>
      </header>

      <section id="list-view" class="panel"></section>
      <section id="detail-view" class="panel hidden"></section>
    </main>

    <script src="assets/app.js" defer></script>
  </body>
</html>
